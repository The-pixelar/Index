    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'blob': 'blob 10s infinite alternate',
                        'ring-pulse': 'ringPulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'rainbow': 'rainbow 5s linear infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        },
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '100%': { transform: 'translate(20px, -30px) scale(1.1)' }
                        },
                        ringPulse: {
                            '0%, 100%': { opacity: '0.3', transform: 'scale(1)' },
                            '50%': { opacity: '0.8', transform: 'scale(1.05)' },
                        },
                        rainbow: {
                            '0%': { backgroundPosition: '0% 50%' },
                            '100%': { backgroundPosition: '200% 50%' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* === SISTEMA DE TEMAS DINÁMICOS === */
        :root {
            /* Tema por defecto (Elegante/Neón) */
            --accent: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.5);
            --gradient-text: linear-gradient(to right, #00e5ff, #b026ff, #00e5ff);
        }

        /* Tema Pride (Se activa con JS en Junio automáticamente) */
        .theme-pride {
            --accent: #ff007f;
            --accent-glow: rgba(255, 0, 127, 0.6);
            --gradient-text: linear-gradient(to right, #ff0018, #ffa52c, #ffff41, #008018, #0000f9, #86007d, #ff0018);
        }

        .dynamic-gradient-text {
            background-image: var(--gradient-text);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: rainbow 6s linear infinite;
        }

        .glass {
            background: rgba(10, 10, 15, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Efecto 3D Premium UX/UI para las Tarjetas */
        .portal-card-wrapper {
            perspective: 1000px;
        }
        
        .portal-card {
            transition: transform 0.1s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            transform-style: preserve-3d;
            will-change: transform;
        }
        
        .portal-card:hover {
            box-shadow: 0 30px 60px -15px var(--accent-glow);
            border-color: rgba(255, 255, 255, 0.2);
            z-index: 10;
        }

        .portal-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), var(--accent-glow) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s ease;
            mix-blend-mode: screen;
            pointer-events: none;
            z-index: 0;
            border-radius: inherit;
        }
        
        .portal-card:hover::before {
            opacity: 0.15;
        }

        /* Animación Revelación de Textos */
        .text-reveal {
            clip-path: polygon(0 100%, 100% 100%, 100% 100%, 0% 100%);
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.2s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .text-reveal.active {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            opacity: 1;
            transform: translateY(0);
        }

        /* Anillos del Easter Egg */
        .ring {
            position: absolute;
            width: 150px; height: 150px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 30px var(--accent-glow), inset 0 0 20px var(--accent-glow);
        }
    </style>
</head>

    <!-- LÓGICA JAVASCRIPT (La Magia)               -->
    <!-- ========================================== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- 0. LÓGICA PRIDE MONTH AUTOMÁTICO (Wow Factor) ---
            const currentMonth = new Date().getMonth(); // 0 = Enero, 5 = Junio
            if (currentMonth === 5) {
                document.documentElement.classList.add('theme-pride');
                document.getElementById('pride-badge').classList.remove('hidden');
                document.getElementById('pride-badge').classList.add('flex');
            }

            // Para forzar la prueba y ver cómo se ve el arcoíris en cualquier mes, 
            // descomenta la siguiente línea:
            // document.documentElement.classList.add('theme-pride'); 

            // Determinar color de las partículas basado en el tema
            const isPride = document.documentElement.classList.contains('theme-pride');
            const particleColor = isPride ? 'rainbow' : '#00e5ff';


            // --- 1. INTRODUCCIÓN DRAMÁTICA ---
            const enterBtn = document.getElementById('enter-btn');
            const introOverlay = document.getElementById('intro-overlay');
            const introFlash = document.getElementById('intro-flash');
            const viewHub = document.getElementById('view-hub');
            const bgMusic = document.getElementById('bgMusic');
            const musicToggle = document.getElementById('music-toggle');
            const musicIcon = document.getElementById('music-icon');
            let isMusicPlaying = false;

            // Secuencia de Textos
            setTimeout(() => {
                document.getElementById('intro-logo').classList.remove('translate-y-8', 'opacity-0');
            }, 300);

            setTimeout(() => {
                document.getElementById('text-seq-1').classList.add('active');
            }, 1200);

            setTimeout(() => {
                document.getElementById('text-seq-1').classList.remove('active');
                setTimeout(() => {
                    document.getElementById('text-seq-2').classList.add('active');
                    // Mostrar botón
                    setTimeout(() => {
                        enterBtn.classList.remove('translate-y-8', 'opacity-0');
                    }, 800);
                }, 800); // Esperar a que salga el texto 1
            }, 4000);

            // Clic en Entrar (Efecto Piel Erizada)
            enterBtn.addEventListener('click', () => {
                // Play Music
                bgMusic.volume = 0.5;
                bgMusic.play().then(() => {
                    isMusicPlaying = true;
                    musicToggle.classList.remove('hidden');
                }).catch(e => console.log("Autoplay bloqueado"));

                // Ocultar elementos actuales
                document.getElementById('intro-logo').style.opacity = '0';
                document.getElementById('text-seq-2').classList.remove('active');
                enterBtn.style.opacity = '0';

                // Disparar Explosión de Luz
                setTimeout(() => {
                    introFlash.classList.remove('opacity-0', 'scale-0');
                    introFlash.classList.add('opacity-100', 'scale-[300]'); // Escala masiva
                    
                    setTimeout(() => {
                        introOverlay.style.display = 'none';
                        // Mostrar Hub Suavemente
                        viewHub.classList.remove('opacity-0', 'pointer-events-none');
                        viewHub.classList.add('opacity-100', 'pointer-events-auto');
                        
                        // Desvanecer flash
                        introFlash.style.opacity = '0';
                    }, 1000);
                }, 500);
            });

            // Play/Pause Música
            musicToggle.addEventListener('click', () => {
                if (isMusicPlaying) {
                    bgMusic.pause();
                    musicIcon.classList.replace('ph-speaker-high', 'ph-speaker-slash');
                } else {
                    bgMusic.play();
                    musicIcon.classList.replace('ph-speaker-slash', 'ph-speaker-high');
                }
                isMusicPlaying = !isMusicPlaying;
            });


            // --- 2. EFECTO 3D HOVER (Tarjetas Premium) ---
            document.querySelectorAll('.portal-card-wrapper').forEach(wrapper => {
                const card = wrapper.querySelector('.portal-card');
                
                wrapper.addEventListener('mousemove', e => {
                    const rect = wrapper.getBoundingClientRect();
                    const x = e.clientX - rect.left; // x position within the element.
                    const y = e.clientY - rect.top;  // y position within the element.
                    
                    // Para el brillo de fondo pseudo-elemento
                    card.style.setProperty('--mouse-x', `${(x / rect.width) * 100}%`);
                    card.style.setProperty('--mouse-y', `${(y / rect.height) * 100}%`);

                    // Cálculo de inclinación 3D
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = ((y - centerY) / centerY) * -5; // Máx 5 grados
                    const rotateY = ((x - centerX) / centerX) * 5;

                    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
                });

                wrapper.addEventListener('mouseleave', () => {
                    card.style.transform = `rotateX(0deg) rotateY(0deg)`;
                });
            });


            // --- 3. SISTEMA DE PORTALES (iframe modal) ---
            const osWrapper = document.getElementById('os-window-wrapper');
            const osWindow = document.getElementById('os-window');
            const osIframe = document.getElementById('portal-iframe');
            const osTitle = document.getElementById('os-window-title');

            window.openPortal = function(url, title) {
                osTitle.textContent = title;
                osIframe.src = url;
                
                osWrapper.classList.remove('hidden');
                setTimeout(() => {
                    osWrapper.classList.remove('opacity-0');
                    osWrapper.classList.add('opacity-100');
                    osWindow.classList.remove('scale-95');
                    osWindow.classList.add('scale-100');
                    
                    // Efecto de profundidad en el fondo
                    viewHub.style.transform = 'scale(0.97)';
                    viewHub.style.filter = 'blur(8px)';
                    viewHub.style.transition = 'all 0.7s ease';
                }, 10);
            };

            osIframe.addEventListener('load', () => {
                if(osIframe.src && osIframe.src !== window.location.href) {
                    osIframe.classList.remove('opacity-0');
                    osIframe.classList.add('opacity-100');
                }
            });

            window.closePortal = function() {
                osWrapper.classList.remove('opacity-100');
                osWrapper.classList.add('opacity-0');
                osWindow.classList.remove('scale-100');
                osWindow.classList.add('scale-95');
                osIframe.classList.remove('opacity-100');
                osIframe.classList.add('opacity-0');
                
                viewHub.style.transform = 'scale(1)';
                viewHub.style.filter = 'none';

                setTimeout(() => {
                    osWrapper.classList.add('hidden');
                    osIframe.src = ''; 
                }, 700);
            };

            window.addEventListener('message', (event) => {
                if (event.data === 'closeModal') closePortal();
            });


            // --- 4. EASTER EGG EMOCIONAL (Inactividad 45s) ---
            let inactivityTimer;
            const easterEggOverlay = document.getElementById('easter-egg-overlay');
            
            function showEasterEgg() {
                if(introOverlay.style.display === 'none' && osWrapper.classList.contains('hidden')) {
                    easterEggOverlay.classList.remove('hidden');
                    setTimeout(() => {
                        easterEggOverlay.classList.remove('opacity-0');
                        easterEggOverlay.classList.add('opacity-100');
                    }, 50);
                }
            }

            function resetInactivityTimer() {
                clearTimeout(inactivityTimer);
                if (!easterEggOverlay.classList.contains('hidden')) {
                    easterEggOverlay.classList.remove('opacity-100');
                    easterEggOverlay.classList.add('opacity-0');
                    setTimeout(() => easterEggOverlay.classList.add('hidden'), 3000);
                }
                inactivityTimer = setTimeout(showEasterEgg, 45000); 
            }

            ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll'].forEach(evt => {
                window.addEventListener(evt, resetInactivityTimer, { passive: true });
            });
            resetInactivityTimer();


            // --- 5. MAGIA DE PARTÍCULAS (Con soporte para Arcoíris) ---
            function setupCanvas(canvasId, colorMode, interactive = false) {
                const canvas = document.getElementById(canvasId);
                if(!canvas) return;
                const ctx = canvas.getContext('2d');
                let particles = [];
                let mouse = { x: null, y: null };

                if (interactive) {
                    canvas.addEventListener('mousemove', (e) => {
                        mouse.x = e.x;
                        mouse.y = e.y;
                    });
                }
                
                function resize() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }
                window.addEventListener('resize', resize);
                resize();

                const colors = ['#ff0018', '#ffa52c', '#ffff41', '#008018', '#0000f9', '#86007d'];

                for(let i=0; i< (interactive ? 120 : 60); i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        r: Math.random() * 2 + 0.5,
                        speedY: Math.random() * 0.5 + 0.1,
                        opacity: Math.random() * 0.5 + 0.1,
                        baseX: Math.random() * canvas.width,
                        color: colorMode === 'rainbow' ? colors[Math.floor(Math.random() * colors.length)] : colorMode
                    });
                }

                function draw() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    particles.forEach(p => {
                        ctx.fillStyle = p.color;
                        ctx.globalAlpha = p.opacity;
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = p.color;
                        
                        // Interacción magnética sutil en la intro
                        if (interactive && mouse.x != null) {
                            let dx = mouse.x - p.x;
                            let dy = mouse.y - p.y;
                            let distance = Math.sqrt(dx * dx + dy * dy);
                            if (distance < 150) {
                                p.x += dx * 0.01;
                                p.y += dy * 0.01;
                            }
                        }

                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        
                        p.y -= p.speedY;
                        if(p.y < -10) {
                            p.y = canvas.height + 10;
                            p.x = Math.random() * canvas.width;
                        }
                    });
                    requestAnimationFrame(draw);
                }
                draw();
            }
            
            // Iniciar partículas (Toman el color dependiendo si es Junio o no)
            setupCanvas('intro-particles', particleColor, true); // Interactiva
            setupCanvas('ambient-canvas', 'rgba(255, 255, 255, 0.2)', false); // Fondo sutil

        });
    </script>
</body>
</html>
