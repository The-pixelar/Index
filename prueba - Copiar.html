    <!-- LÓGICA JAVASCRIPT                          -->

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- 1. INTRODUCCIÓN Y ARRANQUE ---
            const enterBtn = document.getElementById('enter-btn');
            const introOverlay = document.getElementById('intro-overlay');
            const curtainLeft = document.getElementById('curtain-left');
            const curtainRight = document.getElementById('curtain-right');
            const viewHub = document.getElementById('view-hub');
            
            const bgMusic = document.getElementById('bgMusic');
            const musicToggle = document.getElementById('music-toggle');
            const musicIcon = document.getElementById('music-icon');
            let isMusicPlaying = false;

            // Animación inicial Intro
            setTimeout(() => {
                document.getElementById('intro-logo').classList.remove('translate-y-4', 'opacity-0');
                document.getElementById('intro-title').classList.remove('translate-y-4', 'opacity-0');
                document.getElementById('intro-subtitle').classList.remove('translate-y-4', 'opacity-0');
                enterBtn.classList.remove('translate-y-4', 'opacity-0');
            }, 500);

            // Clic en Arrancar Núcleo
            enterBtn.addEventListener('click', () => {
                curtainLeft.classList.remove('hidden');
                curtainRight.classList.remove('hidden');
                void curtainLeft.offsetWidth; // Force reflow
                
                curtainLeft.style.transform = 'scaleX(1)';
                curtainRight.style.transform = 'scaleX(1)';
                
                // Ocultar texto
                document.getElementById('intro-logo').style.opacity = '0';
                document.getElementById('intro-title').style.opacity = '0';
                document.getElementById('intro-subtitle').style.opacity = '0';
                enterBtn.style.opacity = '0';

                // Play Music
                bgMusic.volume = 0.5;
                bgMusic.play().then(() => {
                    isMusicPlaying = true;
                    musicToggle.classList.remove('hidden');
                }).catch(e => console.log("Autoplay bloqueado"));

                setTimeout(() => {
                    introOverlay.style.background = 'transparent';
                    
                    // Mostrar Hub
                    viewHub.classList.remove('opacity-0', 'scale-90', 'pointer-events-none');
                    viewHub.classList.add('opacity-100', 'scale-100', 'pointer-events-auto');
                    
                    setTimeout(() => {
                        curtainLeft.style.transform = 'scaleX(0)';
                        curtainRight.style.transform = 'scaleX(0)';
                        setTimeout(() => { introOverlay.style.display = 'none'; }, 1500);
                    }, 100);
                }, 800);
            });

            // Play/Pause Música
            musicToggle.addEventListener('click', () => {
                if (isMusicPlaying) {
                    bgMusic.pause();
                    musicIcon.classList.replace('ph-speaker-high', 'ph-speaker-slash');
                } else {
                    bgMusic.play();
                    musicIcon.classList.replace('ph-speaker-slash', 'ph-speaker-high');
                }
                isMusicPlaying = !isMusicPlaying;
            });


            // --- 2. SISTEMA DE iFRAMES (El OS) ---
            const osWrapper = document.getElementById('os-window-wrapper');
            const osWindow = document.getElementById('os-window');
            const osIframe = document.getElementById('portal-iframe');
            const osTitle = document.getElementById('os-window-title');

            window.openPortal = function(url, title) {
                // Configurar Modal
                osTitle.textContent = title;
                osIframe.src = url;
                
                // Mostrar Modal
                osWrapper.classList.remove('hidden');
                setTimeout(() => {
                    osWrapper.classList.remove('opacity-0');
                    osWrapper.classList.add('opacity-100');
                    osWindow.classList.remove('scale-95');
                    osWindow.classList.add('scale-100');
                    
                    // Efecto de fondo en el hub
                    viewHub.style.transform = 'scale(0.95)';
                    viewHub.style.filter = 'blur(5px)';
                }, 10);
            };

            // Cuando el iframe termina de cargar, se muestra
            osIframe.addEventListener('load', () => {
                if(osIframe.src && osIframe.src !== window.location.href) {
                    osIframe.classList.remove('opacity-0');
                    osIframe.classList.add('opacity-100');
                }
            });

            window.closePortal = function() {
                // Ocultar Modal
                osWrapper.classList.remove('opacity-100');
                osWrapper.classList.add('opacity-0');
                osWindow.classList.remove('scale-100');
                osWindow.classList.add('scale-95');
                osIframe.classList.remove('opacity-100');
                osIframe.classList.add('opacity-0');
                
                // Restaurar Hub
                viewHub.style.transform = 'scale(1)';
                viewHub.style.filter = 'none';

                setTimeout(() => {
                    osWrapper.classList.add('hidden');
                    osIframe.src = ''; // Limpiar src para apagar videos/audios
                }, 500);
            };

            // Escuchar mensaje 'CERRAR' desde los archivos hijos
            window.addEventListener('message', (event) => {
                if (event.data === 'closeModal') closePortal();
            });


            // --- 3. EASTER EGG DE 45 SEGUNDOS ---
            let inactivityTimer;
            const easterEggOverlay = document.getElementById('easter-egg-overlay');
            
            function showEasterEgg() {
                if(introOverlay.style.display === 'none' && osWrapper.classList.contains('hidden')) {
                    easterEggOverlay.classList.remove('hidden');
                    setTimeout(() => {
                        easterEggOverlay.classList.remove('opacity-0');
                        easterEggOverlay.classList.add('opacity-100');
                    }, 50);
                }
            }

            function resetInactivityTimer() {
                clearTimeout(inactivityTimer);
                if (!easterEggOverlay.classList.contains('hidden')) {
                    easterEggOverlay.classList.remove('opacity-100');
                    easterEggOverlay.classList.add('opacity-0');
                    setTimeout(() => easterEggOverlay.classList.add('hidden'), 2000);
                }
                inactivityTimer = setTimeout(showEasterEgg, 45000); 
            }

            ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll'].forEach(evt => {
                window.addEventListener(evt, resetInactivityTimer, { passive: true });
            });
            resetInactivityTimer();


            // --- 4. CANVAS: PARTÍCULAS NEÓN AZUL (Para la Intro) ---
            function setupCanvas(canvasId, color) {
                const canvas = document.getElementById(canvasId);
                if(!canvas) return;
                const ctx = canvas.getContext('2d');
                let particles = [];
                
                function resize() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }
                window.addEventListener('resize', resize);
                resize();

                for(let i=0; i<80; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        r: Math.random() * 1.5 + 0.5,
                        speedY: Math.random() * 0.5 + 0.1,
                        opacity: Math.random() * 0.5 + 0.1
                    });
                }

                function draw() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = color;
                    particles.forEach(p => {
                        ctx.globalAlpha = p.opacity;
                        ctx.shadowBlur = 5;
                        ctx.shadowColor = color;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        
                        p.y -= p.speedY;
                        if(p.y < -10) {
                            p.y = canvas.height + 10;
                            p.x = Math.random() * canvas.width;
                        }
                    });
                    requestAnimationFrame(draw);
                }
                draw();
            }
            
            // Partículas Intro
            setupCanvas('intro-particles', 'rgba(0, 229, 255, 1)');
            // Partículas sutiles fondo hub
            setupCanvas('ambient-canvas', 'rgba(255, 255, 255, 0.4)');

        });
    </script>
</body>
